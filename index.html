<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Koperasi Warga Lima Sejahtera</title><script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script><style>
:root{--red:#c5161d;--dark:#222;--line:#222;--bg:#f5f6fb}*{box-sizing:border-box}body{margin:0;font-family:Arial,serif;background:var(--bg);color:#111}.top{background:linear-gradient(135deg,#b51218,#e24222);color:white;padding:18px 16px}.top h1{margin:0;font-size:22px}.wrap{max-width:1180px;margin:18px auto;padding:0 12px}.card{background:white;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 4px 18px #0001}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}label{font-weight:bold;font-size:13px}input,select,button{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;font-size:14px}button{background:var(--red);color:white;border:0;font-weight:bold;cursor:pointer}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tabs button{width:auto;background:#333}.tabs button.active{background:var(--red)}.hide{display:none}.actions{display:flex;gap:8px;flex-wrap:wrap}.actions button{width:auto}.report{background:white;padding:12px;overflow:auto}.sheet-title{text-align:center;font-family:Georgia,serif;font-size:22px;font-weight:bold;line-height:1.35}.meta{font-weight:bold;margin:26px 0}.section{font-weight:bold;font-size:18px;margin:24px 0 20px}table{border-collapse:collapse;width:100%;background:white}th,td{border:1.5px solid #222;padding:7px 8px;vertical-align:middle}th{text-align:center;font-family:Georgia,serif;font-size:16px}td.num{text-align:right;white-space:nowrap}.center{text-align:center}.yellow td{background:#fff200;font-weight:bold}.muted{color:#666;font-size:12px}@media(max-width:850px){.grid{grid-template-columns:1fr 1fr}.sheet-title{font-size:17px}th,td{font-size:12px;padding:5px}.wrap{padding:0 6px}}
</style></head><body><div class="top"><h1>Data Transaksi Koperasi Warga Lima Sejahtera</h1><div>Input Kantin, Retail, Simpanan, Pinjaman + Report & Export Excel</div></div><div class="wrap">
<div class="card"><div class="tabs"><button class="active" onclick="tab('kantin')">Kantin</button><button onclick="tab('retail')">Retail</button><button onclick="tab('simpanan')">Simpanan</button><button onclick="tab('pinjaman')">Pinjaman</button></div></div>
<div class="card"><h3 id="formTitle">Input Kantin</h3><div id="formBox"></div><p class="muted">Untuk Cloudflare: pakai D1 binding bernama <b>DB</b>. Export Excel dibuat dari tampilan report.</p></div>
<div class="card"><h3>Filter Report</h3><div class="grid"><div><label>Nomor Anggota</label><input id="fNomor" placeholder="kosongkan untuk semua"></div><div><label>Nama Anggota</label><input id="fNama" placeholder="untuk judul report"></div><div><label>Tahun</label><input id="fTahun" type="number" value="2026"></div><div><label>&nbsp;</label><button onclick="loadReport()">Tampilkan Report</button></div></div><br><div class="actions"><button onclick="exportExcel()">Export Excel Report Ini</button><button onclick="print()">Print / PDF</button></div></div>
<div class="report" id="report"></div></div><script>
let current='kantin', rows=[]; const bulan=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
const rp=n=>'Rp '+Number(n||0).toLocaleString('id-ID'); const y=document.getElementById('fTahun'); y.value=new Date().getFullYear();
function tab(t){current=t;document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');renderForm();loadReport()}
function baseFields(){return `<div><label>Nomor Anggota</label><input id="nomor_anggota"></div><div><label>Nama Anggota</label><input id="nama_anggota"></div>`}
function renderForm(){let h=''; document.getElementById('formTitle').textContent='Input '+current[0].toUpperCase()+current.slice(1);
 if(current==='kantin'||current==='retail') h=`<div class="grid"><div><label>Tanggal</label><input id="tanggal" type="date"></div>${baseFields()}<div><label>Barang yang Dibeli</label><input id="barang"></div><div><label>Jumlah</label><input id="jumlah" type="number" value="1"></div><div><label>Harga Dasar</label><input id="harga_dasar" type="number"></div><div><label>Harga Jual</label><input id="harga_jual" type="number"></div><div><label>Jasa/Laba</label><input id="jasa" type="number" placeholder="otomatis boleh kosong"></div></div>`;
 if(current==='simpanan') h=`<div class="grid"><div><label>Jenis Simpanan</label><select id="jenis"><option value="wajib">Wajib</option><option value="sukarela">Sukarela</option><option value="idulfitri">Idulfitri</option></select></div>${baseFields()}<div><label>Bulan</label><select id="bulan">${bulan.map((b,i)=>`<option value="${i+1}">${b}</option>`).join('')}</select></div><div><label>Tahun</label><input id="tahun" type="number" value="${new Date().getFullYear()}"></div><div><label>Jumlah Simpanan</label><input id="jumlah" type="number"></div></div>`;
 if(current==='pinjaman') h=`<div class="grid"><div><label>Jenis Pinjaman</label><select id="jenis_pinjaman"><option value="reguler">Reguler</option><option value="insidental">Insidental</option></select></div>${baseFields()}<div><label>Bulan</label><select id="bulan">${bulan.map((b,i)=>`<option value="${i+1}">${b}</option>`).join('')}</select></div><div><label>Tahun</label><input id="tahun" type="number" value="${new Date().getFullYear()}"></div><div><label>Jumlah Cicilan</label><input id="cicilan" type="number"></div><div><label>Jenis Jasa</label><select id="jenis_jasa"><option value="jasa_reguler">Jasa Reguler</option><option value="jasa_insidental">Jasa Insidental</option></select></div><div><label>Jumlah Jasa</label><input id="jumlah_jasa" type="number"></div><div><label>Jenis Provisi</label><select id="jenis_provisi"><option value="provisi_reguler">Provisi Reguler</option><option value="provisi_insidental">Provisi Insidental</option></select></div><div><label>Jumlah Provisi</label><input id="jumlah_provisi" type="number"></div><div><label>Sisa Pinjaman</label><input id="sisa_pinjaman" type="number"></div></div>`;
 document.getElementById('formBox').innerHTML=h+`<br><button onclick="save()">Simpan Data</button>`}
function val(id){return document.getElementById(id)?.value||''}
async function save(){let d={type:current,nomor_anggota:val('nomor_anggota'),nama_anggota:val('nama_anggota')};
 if(current==='kantin'||current==='retail') Object.assign(d,{tanggal:val('tanggal'),barang:val('barang'),jumlah:val('jumlah'),harga_dasar:val('harga_dasar'),harga_jual:val('harga_jual'),jasa:val('jasa')});
 if(current==='simpanan') Object.assign(d,{jenis:val('jenis'),bulan:val('bulan'),tahun:val('tahun'),jumlah:val('jumlah')});
 if(current==='pinjaman') Object.assign(d,{jenis_pinjaman:val('jenis_pinjaman'),bulan:val('bulan'),tahun:val('tahun'),cicilan:val('cicilan'),jenis_jasa:val('jenis_jasa'),jumlah_jasa:val('jumlah_jasa'),jenis_provisi:val('jenis_provisi'),jumlah_provisi:val('jumlah_provisi'),sisa_pinjaman:val('sisa_pinjaman')});
 const r=await fetch('/api/data',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(d)}); const j=await r.json(); alert(j.ok?'Tersimpan':'Error: '+j.error); loadReport();}
async function loadReport(){let nomor=val('fNomor'), tahun=val('fTahun'); const r=await fetch(`/api/data?type=${current}&tahun=${tahun}&nomor=${encodeURIComponent(nomor)}`); rows=await r.json(); renderReport()}
function head(title,sec){let nama=val('fNama')||rows[0]?.nama_anggota||'', no=val('fNomor')||rows[0]?.nomor_anggota||''; return `<div class="sheet-title">${title}<br>ANGGOTA KOPERASI WARGA LIMA SEJAHTERA</div><div class="meta">Nama Anggota &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; : ${nama}<br>Nomor Anggota &nbsp;&nbsp;&nbsp; : ${no}</div><div class="section">${sec}</div>`}
function renderKR(){let title='DATA TRANSAKSI HARIAN UNIT USAHA KANTIN DAN RETAIL', sec=current==='kantin'?'A. KANTIN':'B. RETAIL'; let tot=0,jasa=0; let tr=rows.map((r,i)=>{let t=(+r.harga_jual||0)*(+r.jumlah||0);tot+=t;jasa+=+r.jasa||0;return `<tr><td class="center">${i+1}</td><td class="center">${new Date(r.tanggal).toLocaleDateString('id-ID',{day:'2-digit',month:'short'})}</td><td>${r.barang}</td><td class="center">${r.jumlah}</td><td class="num">${rp(r.harga_dasar)}</td><td class="num">${rp(r.harga_jual)}</td><td class="num">${rp(t)}</td><td class="num">${rp(r.jasa)}</td><td></td></tr>`}).join(''); return head(title,sec)+`<table><tr><th>No</th><th>Hari/Tanggal</th><th>Barang yang Dibeli</th><th>Jumlah</th><th>Harga Dasar</th><th>Harga Jual</th><th>Total</th><th>Jasa</th><th>Total Per Bulan</th></tr>${tr}<tr class="yellow"><td colspan="6" class="center">JUMLAH</td><td class="num">${rp(tot)}</td><td class="num">${rp(jasa)}</td><td></td></tr></table>`}
function renderSimp(){let by={}; rows.forEach(r=>{by[r.bulan]=by[r.bulan]||{};by[r.bulan][r.jenis]=(by[r.bulan][r.jenis]||0)+ +r.jumlah}); let tw=0,ts=0,ti=0; let tr=bulan.map((b,i)=>{let m=by[i+1]||{},w=m.wajib||0,s=m.sukarela||0,id=m.idulfitri||0;tw+=w;ts+=s;ti+=id;return `<tr><td class="center">${i+1}</td><td>${b}</td><td></td><td class="num">${w?rp(w):''}</td><td class="num">${s?rp(s):''}</td><td></td><td class="num">${rp(ts)}</td><td class="num">${ts?rp(Math.round(ts*0.00333)):''}</td><td class="num">${id?rp(id):''}</td><td></td><td class="num">${rp(ti)}</td><td></td></tr>`}).join(''); return `<div class="meta">NAMA ANGGOTA &nbsp;&nbsp; : ${val('fNama')||rows[0]?.nama_anggota||''}<br>NOMOR ANGGOTA : ${val('fNomor')||rows[0]?.nomor_anggota||''}</div><div class="section">A. SIMPANAN</div><table><tr><th>No</th><th>Bulan</th><th>Pokok</th><th>Simpanan Wajib</th><th>Simpanan Sukarela</th><th>Pengambilan Simp Sukarela</th><th>Jumlah Simp Sukarela</th><th>Jasa Simp Sukarela</th><th>Simpanan Idulfitri</th><th>Pengambilan Simp Idulfitri</th><th>Jumlah Simp Idulfitri</th><th>Jasa Simp Idulfitri</th></tr>${tr}<tr class="yellow"><td colspan="2" class="center">JUMLAH</td><td></td><td class="num">${rp(tw)}</td><td class="num">${rp(ts)}</td><td></td><td class="num">${rp(ts)}</td><td></td><td class="num">${rp(ti)}</td><td></td><td class="num">${rp(ti)}</td><td></td></tr></table>`}
function renderPinj(){let by={}; rows.forEach(r=>{let k=r.jenis_pinjaman;by[r.bulan]=by[r.bulan]||{reguler:{},insidental:{}};by[r.bulan][k].c=(by[r.bulan][k].c||0)+ +r.cicilan;by[r.bulan][k].j=(by[r.bulan][k].j||0)+ +r.jumlah_jasa;by[r.bulan][k].p=(by[r.bulan][k].p||0)+ +r.jumlah_provisi;by[r.bulan][k].s=+r.sisa_pinjaman||0}); let tc=0,tj=0,tp=0; let tr=bulan.map((b,i)=>{let r=by[i+1]?.reguler||{}, ins=by[i+1]?.insidental||{};tc+=r.c||0;tj+=r.j||0;tp+=r.p||0;return `<tr><td class="center">${i+1}</td><td>${b}</td><td></td><td></td><td class="num">${r.c?rp(r.c):''}</td><td class="num">${r.j?rp(r.j):''}</td><td class="num">${r.p?rp(r.p):''}</td><td class="num">${rp(r.s||0)}</td><td></td><td></td><td class="num">${ins.c?rp(ins.c):''}</td><td class="num">${ins.j?rp(ins.j):''}</td><td class="num">${ins.p?rp(ins.p):''}</td><td class="num">${rp(ins.s||0)}</td></tr>`}).join(''); return `<div class="section">B. PINJAMAN</div><table><tr><th rowspan="2">No</th><th rowspan="2">Bulan</th><th colspan="6">Pinjaman Reguler</th><th colspan="6">Pinjaman Insidental</th></tr><tr><th>Pinjaman</th><th>Tambahan Pinjaman</th><th>Cicilan</th><th>Jasa</th><th>Provisi</th><th>Sisa Pinjaman</th><th>Pinjaman</th><th>Tambahan Pinjaman</th><th>Cicilan</th><th>Jasa</th><th>Provisi</th><th>Sisa Pinjaman</th></tr>${tr}<tr class="yellow"><td colspan="4" class="center">JUMLAH</td><td class="num">${rp(tc)}</td><td class="num">${rp(tj)}</td><td class="num">${rp(tp)}</td><td></td><td colspan="6"></td></tr></table>`}
function renderReport(){document.getElementById('report').innerHTML=(current==='kantin'||current==='retail')?renderKR():current==='simpanan'?renderSimp():renderPinj()}
function exportExcel(){let wb=XLSX.utils.book_new(); let ws=XLSX.utils.table_to_sheet(document.querySelector('#report table')); XLSX.utils.book_append_sheet(wb,ws,current); XLSX.writeFile(wb,`Report_${current}_${val('fNomor')||'semua'}.xlsx`)}
renderForm(); loadReport();
</script></body></html>
